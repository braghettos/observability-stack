---
# ClickHouse credentials for OTel collectors and MCP Server.
#
# IMPORTANT: Replace the placeholder values below with your actual credentials
# before applying. In production, use a secrets management tool (e.g., sealed-secrets,
# external-secrets-operator) instead of storing credentials in version control.
#
# Apply: kubectl apply -f otel-credentials-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: otel-clickhouse-credentials
  namespace: clickhouse-system
  labels:
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: krateo-observability-stack
type: Opaque
stringData:
  username: otelcollector
  password: otelcollectorpass
---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-clickhouse-credentials
  namespace: krateo-system
  labels:
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: krateo-observability-stack
type: Opaque
stringData:
  username: default
  password: ""
