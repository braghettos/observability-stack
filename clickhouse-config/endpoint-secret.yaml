---
# Krateo endpointRef Secret for the ClickHouse HTTP interface.
# The RESTAction template references this Secret via endpointRef so that
# the Krateo composition-events REST call is directed to ClickHouse directly.
#
# Apply: kubectl apply -f endpoint-secret.yaml -n krateo-system
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-internal-endpoint
  namespace: krateo-system
type: Opaque
stringData:
  # ClickHouse HTTP interface served on port 8123.
  # The predefined_query_handler intercepts /events/{composition_id} requests.
  server-url: "http://krateo-clickstack-clickhouse.clickhouse-system.svc:8123"
