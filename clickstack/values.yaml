# ClickStack Helm values for Krateo Kubernetes Observability
#
# Install:
#   helm repo add clickstack https://clickhouse.github.io/ClickStack-helm-charts
#   helm repo update
#   helm install krateo-clickstack clickstack/clickstack \
#     --namespace clickhouse-system --create-namespace \
#     -f values.yaml

# Global settings applied across all sub-charts.
# storageClassName overrides the chart default (local-path) for GKE compatibility.
global:
  storageClassName: "standard-rwo"

# ---------------------------------------------------------------------------
# ClickHouse
# ---------------------------------------------------------------------------
clickhouse:
  enabled: true
  # Override chart default (25.7-alpine) to use ClickHouse 26.2.
  # 26.2 fixes the dynamic_query_handler bad_function_call crash present in 25.7.
  image: "clickhouse/clickhouse-server:26.2-alpine"
  persistence:
    enabled: true
    size: 50Gi
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 2Gi
  # Extra configuration files mounted into /etc/clickhouse-server/config.d/
  # The http-handlers ConfigMap is applied separately (see clickhouse-config/).
  extraVolumes:
    - name: http-handlers-config
      configMap:
        name: clickhouse-http-handlers
  extraVolumeMounts:
    - name: http-handlers-config
      mountPath: /etc/clickhouse-server/config.d/http-handlers.xml
      subPath: http-handlers.xml

# ---------------------------------------------------------------------------
# OpenTelemetry Collector Gateway (receives from DaemonSet + Deployment collectors)
# ---------------------------------------------------------------------------
otel:
  enabled: true
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# ---------------------------------------------------------------------------
# HyperDX UI
# ---------------------------------------------------------------------------
# NOTE: The ClickStack chart does not expose a service.type value for HyperDX.
# After install/upgrade, patch the service to LoadBalancer manually or via
# install.sh (Phase 2b):
#   kubectl patch svc krateo-clickstack-app -n clickhouse-system \
#     -p '{"spec": {"type": "LoadBalancer"}}'
hyperdx:
  enabled: true
  ingress:
    enabled: false

# ---------------------------------------------------------------------------
# MongoDB (used by HyperDX for persistent state)
# ---------------------------------------------------------------------------
mongodb:
  enabled: true
  persistence:
    size: 10Gi
