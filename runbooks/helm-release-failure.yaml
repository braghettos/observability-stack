---
# Runbook: Helm Release Failure — Rollback
#
# Triggered when a Helm release enters a failed state or when pods
# from a Helm-managed deployment start crashing after an upgrade.
apiVersion: krateo.io/v1alpha1
kind: Runbook
metadata:
  name: helm-release-failure
  labels:
    trigger: helm-release-failed
spec:
  trigger:
    source: hyperdx-alert
    filter:
      telemetry_source: k8s-events
      event_type: Warning
      event_reason: FailedCreate,BackOff
    description: "Helm release is in a failed state or pods are crashing after upgrade"

  steps:
    - name: diagnose-events
      description: "Find recent error events related to the deployment"
      agent: observability
      action: run_select_query
      query: |
        SELECT Timestamp,
               JSONExtractString(Body, 'object', 'involvedObject', 'kind') AS kind,
               JSONExtractString(Body, 'object', 'involvedObject', 'name') AS name,
               JSONExtractString(Body, 'object', 'reason') AS reason,
               JSONExtractString(Body, 'object', 'message') AS message
        FROM otel_logs
        WHERE ResourceAttributes['telemetry.source'] = 'k8s-events'
          AND JSONExtractString(Body, 'object', 'type') = 'Warning'
          AND JSONExtractString(Body, 'object', 'involvedObject', 'namespace') = '{{namespace}}'
          AND Timestamp > now() - INTERVAL 30 MINUTE
        ORDER BY Timestamp DESC LIMIT 20
      output: error_events

    - name: inspect-release
      description: "Get the Helm release status and revision history"
      agent: helm-agent
      action: GetRelease
      params:
        release_name: "{{release_name}}"
        namespace: "{{namespace}}"
      output: release_info

    - name: decide
      description: "Determine if rollback is needed"
      condition: "release_status == 'failed' OR pods_crashing_after_upgrade"
      if_true: rollback
      if_false: inspect-values

    - name: rollback
      description: "Rollback to the last known good revision"
      agent: helm-agent
      action: RollbackRelease
      params:
        release_name: "{{release_name}}"
        namespace: "{{namespace}}"
        revision: "{{previous_revision}}"

    - name: inspect-values
      description: "Check release values for misconfigurations"
      agent: helm-agent
      action: GetRelease
      params:
        release_name: "{{release_name}}"
        namespace: "{{namespace}}"
        show_values: true

    - name: verify
      description: "Confirm release is healthy after rollback"
      agent: observability
      action: run_select_query
      wait: 120s
      query: |
        SELECT count() AS error_count
        FROM otel_logs
        WHERE ResourceAttributes['telemetry.source'] = 'k8s-events'
          AND JSONExtractString(Body, 'object', 'type') = 'Warning'
          AND JSONExtractString(Body, 'object', 'involvedObject', 'namespace') = '{{namespace}}'
          AND Timestamp > now() - INTERVAL 2 MINUTE
      success_condition: "error_count == 0"

  escalation:
    max_retries: 1
    on_failure:
      channel: "#krateo-escalation"
      mention: "@oncall"
      message: "Helm release '{{release_name}}' in {{namespace}} failed and rollback did not resolve the issue. Manual intervention required. Current status: {{release_status}}, revision: {{current_revision}}."
