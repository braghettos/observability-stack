---
# Runbook: Alert Storm Suppression
#
# Triggered when more than 10 alerts fire within a 5-minute window.
# Suppresses individual alerts, creates a single summary, and
# investigates the root cause (likely a cluster-wide issue).
apiVersion: krateo.io/v1alpha1
kind: Runbook
metadata:
  name: alert-storm-suppression
  labels:
    trigger: alert-storm
spec:
  trigger:
    source: autopilot-alert-proxy
    filter:
      type: rate
      threshold: 10
      window: 5m
    description: "More than 10 alerts in 5 minutes — likely a cascading or cluster-wide failure"

  steps:
    - name: correlate-alerts
      description: "Identify if alerts share a common cause (same node, namespace, or event)"
      agent: observability
      action: run_select_query
      query: |
        SELECT JSONExtractString(Body, 'object', 'involvedObject', 'namespace') AS ns,
               ResourceAttributes['k8s.node.name'] AS node,
               JSONExtractString(Body, 'object', 'reason') AS reason,
               count() AS event_count
        FROM otel_logs
        WHERE ResourceAttributes['telemetry.source'] = 'k8s-events'
          AND JSONExtractString(Body, 'object', 'type') = 'Warning'
          AND Timestamp > now() - INTERVAL 5 MINUTE
        GROUP BY ns, node, reason
        ORDER BY event_count DESC LIMIT 10
      output: alert_correlation

    - name: decide
      description: "Determine if this is a node failure, namespace issue, or cluster-wide"
      conditions:
        - condition: "all_alerts_same_node"
          action: diagnose-node
          description: "All alerts from one node — likely node failure"
        - condition: "all_alerts_same_namespace"
          action: diagnose-namespace
          description: "All alerts from one namespace — likely deployment issue"
        - condition: "alerts_spread_across_cluster"
          action: escalate-immediately
          description: "Cluster-wide issue — immediate human escalation"

    - name: diagnose-node
      description: "Check node health and conditions"
      agent: observability
      action: run_select_query
      query: |
        SELECT MetricName, Value, Timestamp
        FROM otel_metrics
        WHERE ResourceAttributes['k8s.node.name'] = '{{affected_node}}'
          AND MetricName LIKE '%condition%'
          AND Timestamp > now() - INTERVAL 10 MINUTE
        ORDER BY Timestamp DESC

    - name: diagnose-namespace
      description: "Check recent deployments or changes in the namespace"
      agent: observability
      action: run_select_query
      query: |
        SELECT Timestamp,
               JSONExtractString(Body, 'object', 'involvedObject', 'kind') AS kind,
               JSONExtractString(Body, 'object', 'involvedObject', 'name') AS name,
               JSONExtractString(Body, 'object', 'reason') AS reason,
               JSONExtractString(Body, 'object', 'message') AS message
        FROM otel_logs
        WHERE ResourceAttributes['telemetry.source'] = 'k8s-events'
          AND JSONExtractString(Body, 'object', 'involvedObject', 'namespace') = '{{affected_namespace}}'
          AND Timestamp > now() - INTERVAL 15 MINUTE
        ORDER BY Timestamp DESC LIMIT 30

    - name: escalate-immediately
      description: "Cluster-wide issue requires immediate human attention"
      action: escalate

  escalation:
    max_retries: 0
    on_failure:
      channel: "#krateo-escalation"
      mention: "@oncall"
      priority: critical
      message: "ALERT STORM: {{alert_count}} alerts in 5 minutes. Correlation: {{correlation_summary}}. Suppressing individual agent responses. Human investigation required."
