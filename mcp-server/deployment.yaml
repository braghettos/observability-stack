---
# ClickHouse MCP Server – provides MCP tools (list_databases, list_tables,
# run_select_query) so any MCP-compatible AI agent can query observability data.
#
# Compatible clients: Cursor, Claude Desktop, kagent RemoteMCPServer,
# LangChain MCP adapters, Google ADK MCPToolset, OpenAI Agents SDK, etc.
#
# MCP endpoint: http://clickhouse-mcp-server.krateo-system.svc:8000/mcp
#
# Apply: kubectl apply -f deployment.yaml -n krateo-system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse-mcp-server
  namespace: krateo-system
  labels:
    app.kubernetes.io/name: clickhouse-mcp-server
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clickhouse-mcp-server
  template:
    metadata:
      labels:
        app: clickhouse-mcp-server
        app.kubernetes.io/name: clickhouse-mcp-server
    spec:
      containers:
        - name: mcp-server
          image: mcp/clickhouse:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mcp
              containerPort: 8000
              protocol: TCP
          env:
            # ClickHouse connection – host WITHOUT protocol prefix (interface controlled by CLICKHOUSE_SECURE)
            - name: CLICKHOUSE_HOST
              value: "krateo-clickstack-clickhouse-clickhouse-headless.clickhouse-system.svc"
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_SECURE
              value: "false"
            - name: CLICKHOUSE_VERIFY
              value: "false"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: mcp-clickhouse-credentials
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-clickhouse-credentials
                  key: password
            - name: CLICKHOUSE_DATABASE
              value: "default"
            # Switch from stdio (default) to SSE transport so the server is
            # reachable over HTTP inside the cluster.
            - name: CLICKHOUSE_MCP_SERVER_TRANSPORT
              value: "sse"
            - name: CLICKHOUSE_MCP_BIND_HOST
              value: "0.0.0.0"
            - name: CLICKHOUSE_MCP_BIND_PORT
              value: "8000"
          livenessProbe:
            httpGet:
              path: /mcp
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /mcp
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-mcp-server
  namespace: krateo-system
  labels:
    app.kubernetes.io/name: clickhouse-mcp-server
spec:
  selector:
    app: clickhouse-mcp-server
  ports:
    - name: mcp
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
# Optional: expose MCP server via port-forward for local IDE use.
# kubectl port-forward svc/clickhouse-mcp-server 8000:8000 -n krateo-system
#
# Then add to .cursor/mcp.json:
# {
#   "mcpServers": {
#     "clickhouse": {
#       "url": "http://localhost:8000/mcp"
#     }
#   }
# }
