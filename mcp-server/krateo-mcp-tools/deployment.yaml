---
# Krateo MCP Tools — Pre-built diagnostic tools for AI agents.
#
# Provides high-level MCP tools (get_pod_errors, get_pod_timeline, etc.)
# that wrap ClickHouse queries, reducing agent hallucination on SQL.
#
# MCP endpoint: http://krateo-mcp-tools.krateo-system.svc:8001/mcp
#
# Apply: kubectl apply -f deployment.yaml -n krateo-system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krateo-mcp-tools
  namespace: krateo-system
  labels:
    app.kubernetes.io/name: krateo-mcp-tools
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: krateo-observability-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: krateo-mcp-tools
  template:
    metadata:
      labels:
        app: krateo-mcp-tools
        app.kubernetes.io/name: krateo-mcp-tools
    spec:
      containers:
        - name: mcp-tools
          image: ghcr.io/braghettos/krateo-mcp-tools:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mcp
              containerPort: 8001
              protocol: TCP
          env:
            - name: CLICKHOUSE_URL
              value: "http://krateo-clickstack-clickhouse-clickhouse-headless.clickhouse-system.svc:8123"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: mcp-clickhouse-credentials
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-clickhouse-credentials
                  key: password
            - name: LISTEN_ADDR
              value: ":8001"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 32Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      securityContext:
        runAsNonRoot: true
---
apiVersion: v1
kind: Service
metadata:
  name: krateo-mcp-tools
  namespace: krateo-system
  labels:
    app.kubernetes.io/name: krateo-mcp-tools
spec:
  selector:
    app: krateo-mcp-tools
  ports:
    - name: mcp
      port: 8001
      targetPort: 8001
      protocol: TCP
  type: ClusterIP
