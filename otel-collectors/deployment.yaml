# OpenTelemetry Deployment Collector – cluster-level collection
#
# Uses a custom collector image (otelcol-krateo) that includes the
# compositionresolver processor.  This processor enriches K8s events
# with krateo.io/composition-id by resolving the involvedObject's
# labels via the K8s API — the same logic EventRouter performed.
#
# Install:
#   helm install otel-deployment open-telemetry/opentelemetry-collector \
#     -f deployment.yaml -n clickhouse-system

mode: deployment

replicaCount: 1

image:
  repository: ghcr.io/braghettos/otelcol-krateo
  tag: "0.1.0"
  pullPolicy: IfNotPresent

command:
  name: /otelcol-krateo

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: [events, namespaces, nodes, pods, replicationcontrollers,
                  resourcequotas, services, endpoints]
      verbs: [get, list, watch]
    - apiGroups: [apps]
      resources: [daemonsets, deployments, replicasets, statefulsets]
      verbs: [get, list, watch]
    - apiGroups: [batch]
      resources: [jobs, cronjobs]
      verbs: [get, list, watch]
    - apiGroups: [autoscaling]
      resources: [horizontalpodautoscalers]
      verbs: [get, list, watch]
    # compositionresolver needs GET on any resource type to resolve
    # involvedObject references (CRDs from *.krateo.io, etc.)
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: [get]

presets:
  kubernetesAttributes:
    enabled: false
  kubernetesEvents:
    enabled: false
  clusterMetrics:
    enabled: false

config:
  receivers:
    jaeger: null
    otlp: null
    prometheus: null
    zipkin: null
    k8sobjects:
      objects:
        - name: events
          mode: watch
          group: ""
          namespaces: []

    k8s_cluster:
      collection_interval: 30s
      node_conditions_to_report: [Ready, MemoryPressure, DiskPressure, PIDPressure]
      allocatable_types_to_report: [cpu, memory, ephemeral-storage]

  processors:
    batch:
      send_batch_size: 10000
      timeout: 5s
    memory_limiter:
      check_interval: 5s
      limit_percentage: 75
      spike_limit_percentage: 20

    k8sattributes:
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.node.name
          - k8s.statefulset.name
          - k8s.daemonset.name
          - k8s.replicaset.name
          - k8s.job.name
          - k8s.cronjob.name
        labels:
          - tag_name: $$1
            key_regex: (.*)
            from: pod
      passthrough: false
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.ip
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid
        - sources:
            - from: connection

    resource:
      attributes:
        - key: telemetry.source
          value: "k8s-events"
          action: insert

    # Resolves krateo.io/composition-id from the involvedObject's labels.
    # For each K8s event, the processor GETs the involvedObject via the
    # K8s API, reads its krateo.io/composition-id label, and sets it as
    # a log-record attribute.  Results are cached by involvedObject UID.
    compositionresolver:
      cache_ttl: 5m
      negative_cache_ttl: 30s
      label_key: "krateo.io/composition-id"

  exporters:
    clickhouse:
      endpoint: "tcp://krateo-clickstack-clickhouse.clickhouse-system.svc:9000"
      username: otelcollector
      password: otelcollectorpass
      database: default
      logs_table_name: otel_logs
      traces_table_name: otel_traces
      metrics_table_name: otel_metrics
      create_schema: true
      timeout: 10s
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s

  service:
    pipelines:
      logs:
        receivers: [k8sobjects]
        processors: [memory_limiter, k8sattributes, resource, compositionresolver, batch]
        exporters: [clickhouse]
      metrics: null
      traces: null

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
