# OpenTelemetry DaemonSet Collector – node-level collection
#
# Collects: pod logs, node metrics, kubelet metrics
# One pod per node.
#
# Install:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm install otel-daemonset open-telemetry/opentelemetry-collector \
#     -f daemonset.yaml -n clickhouse-system

mode: daemonset

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: [nodes/proxy]
      verbs: [get]

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  hostMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
    extractAllPodAnnotations: true
  kubeletMetrics:
    enabled: true

config:
  receivers:
    kubeletstats:
      collection_interval: 20s
      auth_type: serviceAccount
      endpoint: "${env:K8S_NODE_NAME}:10250"
      insecure_skip_verify: true
      metrics:
        k8s.pod.cpu_limit_utilization:
          enabled: true
        k8s.pod.cpu_request_utilization:
          enabled: true
        k8s.pod.memory_limit_utilization:
          enabled: true
        k8s.pod.memory_request_utilization:
          enabled: true
        k8s.pod.uptime:
          enabled: true
        k8s.node.uptime:
          enabled: true
        k8s.container.cpu_limit_utilization:
          enabled: true
        k8s.container.cpu_request_utilization:
          enabled: true
        k8s.container.memory_limit_utilization:
          enabled: true
        k8s.container.memory_request_utilization:
          enabled: true
        container.uptime:
          enabled: true

  processors:
    batch:
      send_batch_size: 10000
      timeout: 5s
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

  exporters:
    otlphttp:
      endpoint: "http://krateo-clickstack-otel-collector.clickhouse-system.svc:4318"
      compression: gzip
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [memory_limiter, kubernetesattributes, batch]
        exporters: [otlphttp]
      metrics:
        receivers: [hostmetrics, kubeletstats]
        processors: [memory_limiter, kubernetesattributes, batch]
        exporters: [otlphttp]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
