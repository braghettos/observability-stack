# OpenTelemetry DaemonSet Collector – node-level collection
#
# Collects: pod logs, node metrics, kubelet metrics
# One pod per node.
#
# Install:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm install otel-daemonset open-telemetry/opentelemetry-collector \
#     -f daemonset.yaml -n clickhouse-system

image:
  repository: otel/opentelemetry-collector-contrib

command:
  name: otelcol-contrib

mode: daemonset

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: [nodes/proxy]
      verbs: [get]

presets:
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  hostMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
    extractAllPodLabels: true
  kubeletMetrics:
    enabled: true

config:
  receivers:
    # Override the filelog operators generated by the logsCollection preset.
    # The preset generates the include/exclude/start_at settings; we only
    # override the operators list to add multiline recombination.
    #
    # Problem: Go services in this cluster use a colored pretty-printer that
    # emits one line per JSON field, e.g.:
    #   \x1b[37m[13:40:42]\x1b INFO: msg \x1b[90m{     ← first line (ANSI prefix)
    #     "compositionName": "bench-app-04",            ← indented fields
    #     "service": "chart-inspector"
    #   }\x1b[0m                                        ← closing brace
    #
    # The container-parser operator splits each physical line into a separate
    # OTel log record. The recombine operator re-joins them into one record.
    #
    # is_first_entry logic:
    #   - A new log entry starts when the body does NOT start with two spaces
    #     (indented JSON field) AND does NOT start with "}" (closing brace).
    #   - This works for all formats:
    #     · logfmt (time="..."): each line is its own entry ✓
    #     · compact JSON ({"level":"info"}): each line is its own entry ✓
    #     · ANSI multi-line JSON: lines 2..N-1 (indented) and last (}) are
    #       merged into the first line's record ✓
    filelog:
      operators:
        - id: container-parser
          max_log_size: 102400
          type: container
        - id: recombine-multiline
          type: recombine
          combine_field: body
          combine_with: "\n"
          is_first_entry: 'body not matches "^  " and body not matches "^}"'
          source_identifier: attributes["log.file.path"]
          max_unmatched_batch_size: 100
          overwrite_with: oldest

    hostmetrics:
      collection_interval: 60s

    kubeletstats:
      collection_interval: 60s
      auth_type: serviceAccount
      endpoint: "${env:K8S_NODE_NAME}:10250"
      insecure_skip_verify: true
      metrics:
        k8s.pod.cpu_limit_utilization:
          enabled: true
        k8s.pod.cpu_request_utilization:
          enabled: true
        k8s.pod.memory_limit_utilization:
          enabled: true
        k8s.pod.memory_request_utilization:
          enabled: true
        k8s.pod.uptime:
          enabled: true
        k8s.node.uptime:
          enabled: true
        k8s.container.cpu_limit_utilization:
          enabled: true
        k8s.container.cpu_request_utilization:
          enabled: true
        k8s.container.memory_limit_utilization:
          enabled: true
        k8s.container.memory_request_utilization:
          enabled: true
        container.uptime:
          enabled: true

  processors:
    # Strip ANSI color escape sequences from log bodies before export.
    # Colored log formatters embed codes like \x1b[37m...\x1b[0m that are
    # unreadable in ClickHouse / HyperDX.
    transform:
      log_statements:
        - context: log
          statements:
            - 'replace_pattern(body, "\\x1b\\[[0-9;]*[mGKHFABCDsu]", "")'
    batch:
      send_batch_size: 10000
      timeout: 5s
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

  exporters:
    clickhouse:
      endpoint: "tcp://krateo-clickstack-clickhouse-clickhouse-headless.clickhouse-system.svc:9000"
      username: otelcollector
      password: otelcollectorpass
      database: default
      logs_table_name: otel_logs
      traces_table_name: otel_traces
      metrics_table_name: otel_metrics
      create_schema: false
      timeout: 10s
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [memory_limiter, k8sattributes, transform, batch]
        exporters: [clickhouse]
      metrics:
        receivers: [hostmetrics, kubeletstats]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [clickhouse]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
